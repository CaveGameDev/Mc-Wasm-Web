<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Launcher</title>
    <style>
      
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #202020;
            font-family: 'Courier New', Courier, monospace;
            image-rendering: pixelated;
        }

        .mc-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('imp.webp') no-repeat center center;
            background-size: cover;
            filter: brightness(0.6);
            z-index: -1;
        }

        .launcher-card {
            background: rgba(0, 0, 0, 0.75);
            border: 4px solid #000;
            padding: 40px;
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 10px 10px 0px rgba(0, 0, 0, 0.5);
        }

        .mc-btn {
            appearance: none;
            text-decoration: none;
            display: block;
            text-align: center;
            position: relative;
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            color: #E0E0E0;
            text-shadow: 2px 2px 0px #3F3F3F;
            background: #7E7E7E;
            border: 3px solid #000;
            border-top-color: #B2B2B2;
            border-left-color: #B2B2B2;
            border-right-color: #5B5B5B;
            border-bottom-color: #5B5B5B;
            
            cursor: pointer;
            transition: all 0.05s;
        }

        .mc-btn:hover {
            background: #8E8E8E;
            color: #FFFF55; /* Yellow hover text */
        }

        .mc-btn:active {
            border-top-color: #5B5B5B;
            border-left-color: #5B5B5B;
            border-right-color: #B2B2B2;
            border-bottom-color: #B2B2B2;
            transform: translateY(2px);
        }

        .launcher-title {
            color: #FFF;
            text-align: center;
            font-size: 24px;
            margin-bottom: 20px;
            text-shadow: 3px 3px 0px #3F3F3F;
        }

        .version-tag {
            color: #AAA;
            font-size: 12px;
            text-align: right;
            margin-top: 10px;
        }
        
        .version-c {
            color: #AAA;
            font-size:4px;
            text-align: right;
            margin-top:10px;
        }
    </style>
</head>
<body>

    <div class="mc-bg"></div>

    <div class="launcher-card">
        <div class="launcher-title">MINECRAFT</div>
        
        <a href="https://4-9wasm.pages.dev/" class="mc-btn">Launcher (Latest)</a>
        <a href="https://placeholder-builds.com" class="mc-btn">Builds</a>
        
      <div class="version-tag">Release 1.0</div>
      <div class="version-c">Copyright STG</div>
</div>
</body>
</html>
